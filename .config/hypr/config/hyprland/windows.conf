windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Center and float the system update console
windowrule {
    name = update-system
    match:initial_title = system-update
    float = yes
    center = yes
}

# Center and float the audio controls
windowrule {
    name = pavucontrol
    match:initial_class = org.pulseaudio.pavucontrol
    float = yes
    center = yes
}

# Center and float the bluetooth manager
windowrule {
    name = blueman-manager
    match:initial_class = blueman-manager
    float = yes
    center = yes
}