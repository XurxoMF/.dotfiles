run    = { fg = "{{colors.on_surface.default.hex}}" }
desc    = {}
hovered = { reversed = true, bold = true }
footer = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }

[filetype]
rules = [
    # Imaxes
    { mime = "image/*", fg = "{{colors.on_secondary_container.default.hex}}" },
    # Audio
    { mime = "{audio}/*", fg = "{{colors.on_secondary_container.default.hex}}" },
    # V├¡deo
    { mime = "{audio}/*", fg = "{{colors.on_secondary_container.default.hex}}" },
    # Comprimidos
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "{{colors.on_secondary_container.default.hex}}" },
    # Documentos
    { mime = "application/{pdf,doc,rtf}", fg = "{{colors.on_secondary_container.default.hex}}" },
    # Especiales
    { name = "*", is = "orphan", bg = "{{colors.red_container.default.hex}}" },
    { name = "*", is = "exec", fg = "{{colors.on_red_container.default.hex}}" },
    # Fallback
    { url = "*", fg = "{{colors.on_secondary_container.default.hex}}" },
    { url = "*/", fg = "{{colors.secondary.default.hex}}" },
]

